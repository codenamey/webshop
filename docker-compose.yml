services:
  webshop-db:
    image: mariadb:11.4
    container_name: webshop-db
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./docker-data/db:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - webshop

  webshop-web:
    image: wordpress:php8.2-apache
    container_name: webshop-web
    restart: unless-stopped
    depends_on:
      - webshop-db
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: webshop-db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('FS_METHOD', 'direct');
    volumes:
      - ./docker-data/html:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
    networks:
      - webshop

  webshop-cli:
    image: wordpress:cli-php8.2
    container_name: webshop-cli
    depends_on:
      - webshop-db
      - webshop-web
    environment:
      WORDPRESS_DB_HOST: webshop-db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_PORT: ${WORDPRESS_PORT}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:-Webshop}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:-admin}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:-change-me-local}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ./docker-data/html:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
      - ./scripts/wpcli-setup.sh:/usr/local/bin/wpcli-setup.sh:ro
    networks:
      - webshop
    command: wpcli-setup.sh
    restart: "no"

  webshop-adminer:
    image: adminer:latest
    container_name: webshop-adminer
    restart: unless-stopped
    depends_on:
      - webshop-db
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - webshop

networks:
  webshop:
    name: webshop
